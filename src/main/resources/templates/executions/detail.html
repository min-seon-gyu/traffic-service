<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Result')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <div class="page-header fade-up">
        <div>
            <h2>Execution #<span th:text="${execution.id}"></span></h2>
        </div>
        <span class="badge" th:if="${execution.result != null}"
              th:classappend="'badge-' + ${execution.result.name().toLowerCase()}"
              th:text="${execution.result}"
              style="font-size:0.85rem; padding:0.35rem 0.9rem;"></span>
    </div>

    <div class="metric-grid fade-up">
        <div class="metric-item">
            <div class="metric-value accent" th:text="${execution.totalRequests}"></div>
            <div class="metric-label">Total Requests <span class="tip" data-tip="테스트 동안 보낸 총 요청 수입니다.">?</span></div>
        </div>
        <div class="metric-item violet">
            <div class="metric-value violet" th:text="${#numbers.formatDecimal(execution.avgResponseTime, 0, 1)} + 'ms'"></div>
            <div class="metric-label">Avg Response Time <span class="tip" data-tip="전체 요청의 평균 응답 시간입니다.">?</span></div>
        </div>
        <div class="metric-item success">
            <div class="metric-value success" th:text="${#numbers.formatDecimal(execution.tps, 0, 1)}"></div>
            <div class="metric-label">TPS <span class="tip" data-tip="초당 처리된 평균 요청 수(Transactions Per Second)입니다.">?</span></div>
        </div>
        <div class="metric-item warning">
            <div class="metric-value" th:text="${#numbers.formatDecimal(execution.errorRate, 0, 1)} + '%'"
                 th:styleappend="${execution.errorRate > 5 ? 'color:var(--danger)' : 'color:var(--success)'}"></div>
            <div class="metric-label">Error Rate <span class="tip" data-tip="전체 요청 중 실패한 요청의 비율(%)입니다.">?</span></div>
        </div>
    </div>

    <div class="card fade-up">
        <div class="card-header"><h3>Response Time Distribution <span class="tip" data-tip="응답 시간의 퍼센타일 분포입니다. P50은 절반의 요청이 이 시간 이내, P99는 99%가 이 시간 이내에 응답했음을 의미합니다.">?</span></h3></div>
        <div class="percentile-grid">
            <div class="percentile-item">
                <div class="percentile-label">p50</div>
                <div class="percentile-value" style="color:var(--success)" th:text="${#numbers.formatDecimal(execution.p50, 0, 1)} + 'ms'"></div>
            </div>
            <div class="percentile-item">
                <div class="percentile-label">p90</div>
                <div class="percentile-value" style="color:var(--accent)" th:text="${#numbers.formatDecimal(execution.p90, 0, 1)} + 'ms'"></div>
            </div>
            <div class="percentile-item">
                <div class="percentile-label">p95</div>
                <div class="percentile-value" style="color:var(--warning)" th:text="${#numbers.formatDecimal(execution.p95, 0, 1)} + 'ms'"></div>
            </div>
            <div class="percentile-item">
                <div class="percentile-label">p99</div>
                <div class="percentile-value" style="color:var(--danger)" th:text="${#numbers.formatDecimal(execution.p99, 0, 1)} + 'ms'"></div>
            </div>
        </div>
    </div>

    <div class="card fade-up">
        <div class="card-header"><h3>Summary</h3></div>
        <table class="summary-table">
            <tr><td>Status</td><td><span class="badge" th:classappend="'badge-' + ${execution.status.name().toLowerCase()}" th:text="${execution.status}"></span></td></tr>
            <tr><td>Success</td><td style="color:var(--success)" th:text="${execution.successCount}"></td></tr>
            <tr><td>Failed</td><td style="color:var(--danger)" th:text="${execution.failCount}"></td></tr>
            <tr><td>Started</td><td th:text="${#temporals.format(execution.startedAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
            <tr th:if="${execution.finishedAt != null}"><td>Finished</td><td th:text="${#temporals.format(execution.finishedAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
        </table>
    </div>

    <div style="margin-top:1rem; display:flex; gap:0.5rem;" class="fade-up">
        <form th:if="${plan != null}" th:action="@{/executions/start/{id}(id=${plan.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-success">Rerun</button>
        </form>
        <a href="/executions" class="btn btn-ghost">Back to List</a>
    </div>
</div>
</body>
</html>
