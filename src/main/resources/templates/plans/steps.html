<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Steps')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <div class="page-header fade-up">
        <div>
            <h2>Steps: <span th:text="${plan.name}"></span></h2>
            <p class="subtitle">Define the sequence of HTTP requests</p>
        </div>
        <a th:href="@{/plans/{id}(id=${plan.id})}" class="btn btn-ghost">Back to Plan</a>
    </div>
    <div class="card fade-up">
        <div class="card-header">
            <h3>Scenario Steps</h3>
            <span class="mono" style="color:var(--text-muted)"
                  th:if="${!steps.isEmpty()}"
                  th:text="${#lists.size(steps)} + ' STEPS'"></span>
        </div>
        <div th:each="step : ${steps}" class="step-item">
            <span class="step-order" th:text="${#strings.length('' + step.orderIndex) == 1 ? '0' + step.orderIndex : step.orderIndex}"></span>
            <span class="badge"
                  th:classappend="'badge-' + ${step.httpMethod.toLowerCase()}"
                  th:text="${step.httpMethod}"
                  style="width:56px;text-align:center"></span>
            <div class="step-info">
                <div class="step-name" th:text="${step.name}"></div>
                <div class="step-path" th:text="${step.path}"></div>
            </div>
            <span class="step-meta" th:text="${step.thinkTimeMs != null ? step.thinkTimeMs + 'ms' : 'default'}"></span>
            <form th:action="@{/plans/{pid}/steps/{sid}/delete(pid=${plan.id},sid=${step.id})}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Del</button>
            </form>
        </div>
        <div th:if="${steps.isEmpty()}" class="empty-state">
            <p>No steps yet. Add one below.</p>
        </div>
    </div>

    <div class="card fade-up">
        <div class="card-header"><h3>Add Step</h3></div>
        <form th:action="@{/plans/{id}/steps(id=${plan.id})}" method="post">
            <div class="grid-2">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Login" required/>
                </div>
                <div class="form-group">
                    <label>HTTP Method</label>
                    <select name="httpMethod" class="form-control">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Path</label>
                    <input type="text" name="path" class="form-control" placeholder="/api/endpoint" required/>
                </div>
                <div class="form-group">
                    <label>Think Time (ms, optional)</label>
                    <input type="number" name="thinkTimeMs" class="form-control" min="0"/>
                </div>
            </div>
            <div class="form-group">
                <label>Body (JSON)</label>
                <textarea name="body" class="form-control" rows="3" placeholder='{"key": "value"}'></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Step</button>
        </form>
    </div>
</div>
</body>
</html>
