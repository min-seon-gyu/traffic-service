<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Plan')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <div class="page-header fade-up">
        <div>
            <h2 th:text="${isNew} ? 'New Test Plan' : 'Edit: ' + ${plan.name}"></h2>
            <p class="subtitle" th:text="${isNew} ? 'Define your load test configuration' : 'Update your test plan settings'"></p>
        </div>
        <a href="/plans" class="btn btn-ghost">Cancel</a>
    </div>
    <div class="card fade-up">
        <form th:action="${isNew} ? @{/plans} : @{/plans/{id}(id=${plan.id})}" method="post">
            <div class="grid-2">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" th:value="${plan.name}" placeholder="e.g. User Login Flow" required/>
                </div>
                <div class="form-group">
                    <label>Target Base URL</label>
                    <input type="text" name="targetBaseUrl" class="form-control" th:value="${plan.targetBaseUrl}" placeholder="https://api.example.com" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="2" th:text="${plan.description}" placeholder="Optional description for this test plan..."></textarea>
            </div>

            <div class="form-section">Load Configuration</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Virtual Users (VU)</label>
                    <input type="number" name="vuCount" class="form-control" th:value="${plan.loadConfig.vuCount}" min="1"/>
                </div>
                <div class="form-group">
                    <label>Requests per VU (empty = duration-based)</label>
                    <input type="number" name="requestsPerVu" class="form-control" th:value="${plan.loadConfig.requestsPerVu}" min="1"/>
                </div>
                <div class="form-group">
                    <label>Ramp-up (seconds)</label>
                    <input type="number" name="rampUpSeconds" class="form-control" th:value="${plan.loadConfig.rampUpSeconds}" min="0"/>
                </div>
                <div class="form-group">
                    <label>Duration (seconds, empty = request-based)</label>
                    <input type="number" name="durationSeconds" class="form-control" th:value="${plan.loadConfig.durationSeconds}" min="1"/>
                </div>
                <div class="form-group">
                    <label>Max Duration (seconds)</label>
                    <input type="number" name="maxDuration" class="form-control" th:value="${plan.loadConfig.maxDuration}" min="1"/>
                </div>
            </div>

            <div class="form-section">Safety</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Abort on Error Rate (%)</label>
                    <input type="number" name="abortOnErrorRate" class="form-control" th:value="${plan.safetyConfig.abortOnErrorRate}" min="1" max="100"/>
                </div>
                <div class="form-group">
                    <label>Graceful Stop Timeout (seconds)</label>
                    <input type="number" name="gracefulStopTimeout" class="form-control" th:value="${plan.safetyConfig.gracefulStopTimeout}" min="0"/>
                </div>
                <div class="form-group">
                    <label>Request Timeout (ms)</label>
                    <input type="number" name="timeoutMs" class="form-control" th:value="${plan.advancedConfig.timeoutMs}" min="100"/>
                </div>
            </div>

            <div style="margin-top:1.5rem; display:flex; gap:0.5rem;">
                <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create Plan' : 'Save'">Save</button>
                <a href="/plans" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
    <div th:unless="${isNew}" class="card fade-up">
        <div class="card-header">
            <h3>Scenario Steps</h3>
            <span class="mono" style="color:var(--text-muted)"
                  th:if="${steps != null && !steps.isEmpty()}"
                  th:text="${#lists.size(steps)} + ' STEPS'"></span>
        </div>
        <p th:if="${steps == null || steps.isEmpty()}" style="color:var(--text-muted);font-size:0.88rem;">No steps yet.</p>
        <a th:href="@{/plans/{id}/steps(id=${plan.id})}" class="btn btn-ghost">Edit Steps</a>
    </div>
</div>
</body>
</html>
