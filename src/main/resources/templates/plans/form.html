<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Plan')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <div class="page-header fade-up">
        <div>
            <h2 th:text="${isNew} ? 'New Test Plan' : 'Edit: ' + ${plan.name}"></h2>
            <p class="subtitle" th:text="${isNew} ? 'Define your load test configuration' : 'Update your test plan settings'"></p>
        </div>
        <a href="/plans" class="btn btn-ghost">Back to Plans</a>
    </div>

    <!-- Plan Config -->
    <div class="card fade-up">
        <div class="card-header"><h3>Plan Configuration</h3></div>
        <form th:action="${isNew} ? @{/plans} : @{/plans/{id}(id=${plan.id})}" method="post" id="planForm" onsubmit="return validatePlanForm()">
            <div class="grid-2">
                <div class="form-group">
                    <label>Name <span class="tip" data-tip="테스트 플랜의 이름입니다.">?</span></label>
                    <input type="text" name="name" class="form-control" th:value="${plan.name}" placeholder="e.g. User Login Flow" required/>
                </div>
                <div class="form-group">
                    <label>Target Base URL <span class="tip" data-tip="부하를 보낼 대상 서버의 기본 URL입니다. (예: https://api.example.com)">?</span></label>
                    <input type="text" name="targetBaseUrl" class="form-control" th:value="${plan.targetBaseUrl}" placeholder="https://api.example.com" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Description <span class="tip" data-tip="테스트 목적이나 시나리오에 대한 설명입니다.">?</span></label>
                <textarea name="description" class="form-control" rows="2" th:text="${plan.description}" placeholder="Optional description for this test plan..."></textarea>
            </div>

            <div class="form-section">Load Configuration</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Virtual Users (VU) <span class="tip" data-tip="동시에 요청을 보내는 가상 사용자 수입니다.">?</span></label>
                    <input type="number" name="vuCount" class="form-control" th:value="${plan.loadConfig.vuCount}" min="1"/>
                </div>
                <div class="form-group">
                    <label>Requests per VU <span class="tip" data-tip="각 VU가 보내는 총 요청 수입니다. Duration과 둘 중 하나는 반드시 입력해야 합니다. Stages 설정 시에는 불필요합니다.">?</span></label>
                    <input type="number" name="requestsPerVu" class="form-control" th:value="${plan.loadConfig.requestsPerVu}" min="1" id="requestsPerVu"/>
                </div>
                <div class="form-group">
                    <label>Ramp-up (seconds) <span class="tip" data-tip="VU를 점진적으로 늘리는 시간(초)입니다. 0이면 모든 VU가 동시에 시작합니다.">?</span></label>
                    <input type="number" name="rampUpSeconds" class="form-control" th:value="${plan.loadConfig.rampUpSeconds}" min="0"/>
                </div>
                <div class="form-group">
                    <label>Duration (seconds) <span class="tip" data-tip="테스트 지속 시간(초)입니다. Requests per VU와 둘 중 하나는 반드시 입력해야 합니다. Stages 설정 시에는 불필요합니다.">?</span></label>
                    <input type="number" name="durationSeconds" class="form-control" th:value="${plan.loadConfig.durationSeconds}" min="1" id="durationSeconds"/>
                </div>
                <div class="form-group">
                    <label>Max Duration (seconds) <span class="tip" data-tip="테스트의 최대 허용 시간(초)입니다. 이 시간이 지나면 강제 종료됩니다.">?</span></label>
                    <input type="number" name="maxDuration" class="form-control" th:value="${plan.loadConfig.maxDuration}" min="1"/>
                </div>
            </div>

            <div class="form-section">Stages <span class="tip" data-tip="가변 부하 프로파일을 정의합니다. 설정하면 위의 VU/Duration보다 우선 적용됩니다.">?</span></div>
            <div id="stage-list">
                <div th:if="${!isNew}" th:each="stage : ${plan.loadConfig.stages}" class="stage-row" style="display:grid;grid-template-columns:1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Duration (s)</label>
                        <input type="number" name="stageDuration" class="form-control" th:value="${stage.durationSeconds}" min="1"/>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Target VU</label>
                        <input type="number" name="stageTargetVu" class="form-control" th:value="${stage.targetVu}" min="0"/>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.stage-row').remove()" style="margin-bottom:0.25rem;">X</button>
                </div>
            </div>
            <button type="button" class="btn btn-ghost btn-sm" onclick="addStageRow()" style="margin-bottom:1rem;">+ Add Stage</button>

            <div class="form-section">Safety</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Abort on Error Rate (%) <span class="tip" data-tip="에러율이 이 값을 초과하면 테스트를 자동으로 중단합니다.">?</span></label>
                    <input type="number" name="abortOnErrorRate" class="form-control" th:value="${plan.safetyConfig.abortOnErrorRate}" min="1" max="100"/>
                </div>
                <div class="form-group">
                    <label>Graceful Stop Timeout (s) <span class="tip" data-tip="테스트 중단 시 진행 중인 요청을 기다리는 최대 시간(초)입니다.">?</span></label>
                    <input type="number" name="gracefulStopTimeout" class="form-control" th:value="${plan.safetyConfig.gracefulStopTimeout}" min="0"/>
                </div>
            </div>

            <div class="form-section">Thresholds <span class="tip" data-tip="성능 기준을 설정합니다. 모든 조건을 충족하면 Pass, 아니면 Fail로 판정됩니다.">?</span></div>
            <div id="threshold-list">
                <div th:if="${!isNew}" th:each="th : ${plan.thresholds}" class="threshold-row" style="display:grid;grid-template-columns:140px 100px 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Metric</label>
                        <select name="thresholdMetric" class="form-control">
                            <option value="AVG" th:selected="${th.metric.name() == 'AVG'}">AVG</option>
                            <option value="P50" th:selected="${th.metric.name() == 'P50'}">P50</option>
                            <option value="P90" th:selected="${th.metric.name() == 'P90'}">P90</option>
                            <option value="P95" th:selected="${th.metric.name() == 'P95'}">P95</option>
                            <option value="P99" th:selected="${th.metric.name() == 'P99'}">P99</option>
                            <option value="ERROR_RATE" th:selected="${th.metric.name() == 'ERROR_RATE'}">Error Rate</option>
                            <option value="TPS" th:selected="${th.metric.name() == 'TPS'}">TPS</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Operator</label>
                        <select name="thresholdOperator" class="form-control">
                            <option value="LT" th:selected="${th.operator.name() == 'LT'}">&lt;</option>
                            <option value="LTE" th:selected="${th.operator.name() == 'LTE'}">&le;</option>
                            <option value="GT" th:selected="${th.operator.name() == 'GT'}">&gt;</option>
                            <option value="GTE" th:selected="${th.operator.name() == 'GTE'}">&ge;</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Value</label>
                        <input type="text" name="thresholdValue" class="form-control" th:value="${th.value}"/>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.threshold-row').remove()" style="margin-bottom:0.25rem;">X</button>
                </div>
            </div>
            <button type="button" class="btn btn-ghost btn-sm" onclick="addThresholdRow()" style="margin-bottom:1rem;">+ Add Threshold</button>

            <div class="form-section">Advanced</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Request Timeout (ms) <span class="tip" data-tip="개별 HTTP 요청의 최대 대기 시간(ms)입니다. 초과하면 실패로 처리됩니다.">?</span></label>
                    <input type="number" name="timeoutMs" class="form-control" th:value="${plan.advancedConfig.timeoutMs}" min="100"/>
                </div>
                <div class="form-group">
                    <label>Think Time Strategy <span class="tip" data-tip="스텝 사이 대기 방식입니다. Constant(고정 시간), Random(랜덤 범위), Pacing(반복 전체 시간 기준 조절).">?</span></label>
                    <select name="thinkTimeStrategy" class="form-control" id="thinkTimeStrategy" onchange="toggleThinkTime()">
                        <option value="CONSTANT" th:selected="${plan.advancedConfig.thinkTimeStrategy.name() == 'CONSTANT'}">Constant</option>
                        <option value="RANDOM" th:selected="${plan.advancedConfig.thinkTimeStrategy.name() == 'RANDOM'}">Random</option>
                        <option value="PACING" th:selected="${plan.advancedConfig.thinkTimeStrategy.name() == 'PACING'}">Pacing</option>
                    </select>
                </div>
                <div class="form-group" id="thinkTimeMsGroup">
                    <label>Think Time (ms)</label>
                    <input type="number" name="thinkTimeMs" class="form-control" th:value="${plan.advancedConfig.thinkTimeMs}" min="0"/>
                </div>
                <div class="form-group" id="thinkTimeMinGroup" style="display:none;">
                    <label>Think Time Min (ms)</label>
                    <input type="number" name="thinkTimeMin" class="form-control" th:value="${plan.advancedConfig.thinkTimeMin}" min="0"/>
                </div>
                <div class="form-group" id="thinkTimeMaxGroup" style="display:none;">
                    <label>Think Time Max (ms)</label>
                    <input type="number" name="thinkTimeMax" class="form-control" th:value="${plan.advancedConfig.thinkTimeMax}" min="0"/>
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;padding-top:1.5rem;">
                    <input type="checkbox" name="discardResponseBody" value="true" id="discardBody" th:checked="${plan.advancedConfig.discardResponseBody}" style="width:auto;"/>
                    <label for="discardBody" style="margin:0;">Discard Response Body <span class="tip" data-tip="응답 본문을 버려 메모리를 절약합니다. Extractor를 사용하지 않을 때 활성화하세요.">?</span></label>
                </div>
            </div>

            <div class="form-section">Authentication</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Auth Mode <span class="tip" data-tip="Login Step: 스텝에서 로그인 후 Extractor로 토큰 추출. Token Pool: 미리 발급된 토큰을 VU에 라운드 로빈으로 분배합니다.">?</span></label>
                    <select name="authMode" class="form-control" id="authMode" onchange="toggleAuthTokens()">
                        <option value="LOGIN_STEP" th:selected="${plan.authConfig.mode.name() == 'LOGIN_STEP'}">Login Step (extract token via Extractor)</option>
                        <option value="TOKEN_POOL" th:selected="${plan.authConfig.mode.name() == 'TOKEN_POOL'}">Token Pool (pre-configured tokens)</option>
                    </select>
                </div>
            </div>
            <div class="form-group" id="authTokensGroup" style="display:none;">
                <label>Tokens <span class="tip" data-tip="한 줄에 하나씩 토큰을 입력합니다. VU에 라운드 로빈으로 배분되며, 스텝에서 {{token}}으로 참조합니다.">?</span></label>
                <textarea name="authTokens" class="form-control" rows="4" placeholder="eyJhbGciOi...&#10;eyJhbGciOi...&#10;eyJhbGciOi..." th:text="${#strings.listJoin(plan.authConfig.tokens, '&#10;')}"></textarea>
            </div>

            <div class="form-section">Data Source <span class="tip" data-tip="외부 CSV/JSON 파일에서 테스트 데이터를 읽어 VU에 분배합니다.">?</span></div>
            <div class="grid-2">
                <div class="form-group">
                    <label>File Path <span class="tip" data-tip="테스트 데이터가 담긴 CSV/JSON 파일의 경로입니다.">?</span></label>
                    <input type="text" name="dsFilePath" class="form-control" th:value="${plan.dataSourceConfig?.filePath}" placeholder="/data/users.csv"/>
                </div>
                <div class="form-group">
                    <label>Distribution <span class="tip" data-tip="데이터 분배 방식입니다. Sequential(순차), Random(랜덤), Circular(순환 반복).">?</span></label>
                    <select name="dsDistribution" class="form-control">
                        <option value="SEQUENTIAL" th:selected="${plan.dataSourceConfig != null && plan.dataSourceConfig.distribution.name() == 'SEQUENTIAL'}">Sequential</option>
                        <option value="RANDOM" th:selected="${plan.dataSourceConfig != null && plan.dataSourceConfig.distribution.name() == 'RANDOM'}">Random</option>
                        <option value="CIRCULAR" th:selected="${plan.dataSourceConfig != null && plan.dataSourceConfig.distribution.name() == 'CIRCULAR'}">Circular</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>On EOF <span class="tip" data-tip="파일 끝에 도달했을 때 동작입니다. Recycle(처음부터 반복), Stop VU(해당 VU 중단).">?</span></label>
                    <select name="dsOnEof" class="form-control">
                        <option value="RECYCLE" th:selected="${plan.dataSourceConfig != null && plan.dataSourceConfig.onEof.name() == 'RECYCLE'}">Recycle</option>
                        <option value="STOP_VU" th:selected="${plan.dataSourceConfig != null && plan.dataSourceConfig.onEof.name() == 'STOP_VU'}">Stop VU</option>
                    </select>
                </div>
            </div>

            <div style="margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create Plan' : 'Save Changes'">Save</button>
            </div>
        </form>
    </div>

    <!-- Steps Section (only for existing plans) -->
    <div th:unless="${isNew}">
        <div class="card fade-up">
            <div class="card-header">
                <h3>Scenario Steps</h3>
                <span class="mono" style="color:var(--text-muted)"
                      th:if="${steps != null && !steps.isEmpty()}"
                      th:text="${#lists.size(steps)} + ' STEPS'"></span>
            </div>
            <div th:if="${steps != null && !steps.isEmpty()}">
                <div th:each="step, stat : ${steps}" class="step-item">
                    <span class="step-order" th:text="${stat.count}"></span>
                    <span class="badge"
                          th:classappend="'badge-' + ${step.httpMethod.name().toLowerCase()}"
                          th:text="${step.httpMethod}"
                          style="width:56px;text-align:center"></span>
                    <div class="step-info">
                        <div class="step-name" th:text="${step.name}"></div>
                        <div class="step-path" th:text="${step.path}"></div>
                        <div th:if="${step.headers != null && !step.headers.isEmpty()}" class="step-path" style="color:var(--violet);">
                            <span th:each="entry : ${step.headers}" class="mono" style="font-size:0.72rem;">
                                <span th:text="${entry.key}"></span>: <span th:text="${entry.value}"></span>
                                <br/>
                            </span>
                        </div>
                        <div th:if="${!step.extractors.isEmpty()}" class="step-path" style="color:var(--accent);">
                            <span th:each="ext : ${step.extractors}" class="mono" style="font-size:0.72rem;">
                                <span th:text="${ext.source}"></span> <span th:text="${ext.jsonPath}"></span> &rarr; <span th:text="'{{' + ${ext.variableName} + '}}'"></span>
                                <br/>
                            </span>
                        </div>
                        <div th:if="${!step.validators.isEmpty()}" class="step-path" style="color:var(--warning);">
                            <span th:each="val : ${step.validators}" class="mono" style="font-size:0.72rem;">
                                <span th:text="${val.type}"></span> = <span th:text="${val.expected}"></span>
                                <br/>
                            </span>
                        </div>
                    </div>
                    <span class="step-meta" th:text="${step.thinkTimeMs != null ? step.thinkTimeMs + 'ms' : 'default'}"></span>
                    <div class="btn-group">
                        <a th:href="@{/plans/{pid}(pid=${plan.id},editStep=${step.id})}" class="btn btn-ghost btn-sm">Edit</a>
                        <form th:action="@{/plans/{pid}/steps/{sid}/delete(pid=${plan.id},sid=${step.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm">Del</button>
                        </form>
                    </div>
                </div>
            </div>
            <div th:if="${steps == null || steps.isEmpty()}" class="empty-state">
                <p>No steps yet. Add your first step below.</p>
            </div>
        </div>

        <div class="card fade-up" th:id="${editingStep != null ? 'step-form' : ''}">
            <div class="card-header">
                <h3 th:text="${editingStep != null ? 'Edit Step: ' + editingStep.name : 'Add Step'}"></h3>
                <a th:if="${editingStep != null}" th:href="@{/plans/{id}(id=${plan.id})}" class="btn btn-ghost btn-sm">Cancel</a>
            </div>
            <form th:action="${editingStep != null ? '/plans/' + plan.id + '/steps/' + editingStep.id : '/plans/' + plan.id + '/steps'}" method="post">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Name <span class="tip" data-tip="스텝의 이름입니다. (예: Login, Get Profile)">?</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Login" required
                               th:value="${editingStep != null ? editingStep.name : ''}"/>
                    </div>
                    <div class="form-group">
                        <label>HTTP Method <span class="tip" data-tip="요청에 사용할 HTTP 메서드입니다.">?</span></label>
                        <select name="httpMethod" class="form-control">
                            <option value="GET" th:selected="${editingStep != null && editingStep.httpMethod.name() == 'GET'}">GET</option>
                            <option value="POST" th:selected="${editingStep != null && editingStep.httpMethod.name() == 'POST'}">POST</option>
                            <option value="PUT" th:selected="${editingStep != null && editingStep.httpMethod.name() == 'PUT'}">PUT</option>
                            <option value="DELETE" th:selected="${editingStep != null && editingStep.httpMethod.name() == 'DELETE'}">DELETE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Path <span class="tip" data-tip="요청 경로입니다. {{변수명}}으로 이전 스텝에서 추출한 값을 사용할 수 있습니다.">?</span></label>
                        <input type="text" name="path" class="form-control" placeholder="/api/endpoint" required
                               th:value="${editingStep != null ? editingStep.path : ''}"/>
                    </div>
                    <div class="form-group">
                        <label>Think Time (ms) <span class="tip" data-tip="이 스텝 실행 후 다음 스텝까지 대기 시간(ms)입니다. 비워두면 글로벌 설정을 따릅니다.">?</span></label>
                        <input type="number" name="thinkTimeMs" class="form-control" min="0"
                               th:value="${editingStep != null ? editingStep.thinkTimeMs : ''}"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Headers (JSON) <span class="tip" data-tip="HTTP 요청 헤더를 JSON으로 입력합니다. {{변수명}} 사용 가능합니다.">?</span></label>
                    <textarea name="headers" class="form-control" rows="2" placeholder='{"Content-Type": "application/json", "Authorization": "Bearer token"}'
                              th:text="${editingStepHeadersJson != null ? editingStepHeadersJson : ''}"></textarea>
                </div>
                <div class="form-group">
                    <label>Body (JSON) <span class="tip" data-tip="HTTP 요청 본문을 JSON으로 입력합니다. {{변수명}} 사용 가능합니다.">?</span></label>
                    <textarea name="body" class="form-control" rows="3" placeholder='{"key": "value"}'
                              th:text="${editingStep != null ? editingStep.body : ''}"></textarea>
                </div>

                <div class="form-section">Extractors <span class="tip" data-tip="응답에서 값을 추출하여 변수로 저장합니다. 이후 스텝에서 {{변수명}}으로 참조할 수 있습니다.">?</span></div>
                <div id="extractor-list">
                    <!-- 편집 모드: 기존 Extractor 표시 -->
                    <div th:if="${editingStep != null}" th:each="ext : ${editingStep.extractors}" class="extractor-row" style="display:grid;grid-template-columns:120px 1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                        <div class="form-group" style="margin-bottom:0;">
                            <select name="extractorSource" class="form-control">
                                <option value="BODY" th:selected="${ext.source.name() == 'BODY'}">Body</option>
                                <option value="HEADER" th:selected="${ext.source.name() == 'HEADER'}">Header</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <input type="text" name="extractorJsonPath" class="form-control" th:value="${ext.jsonPath}"/>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <input type="text" name="extractorVariable" class="form-control" th:value="${ext.variableName}"/>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.extractor-row').remove()" style="margin-bottom:0.25rem;">X</button>
                    </div>
                    <!-- 신규 모드: 빈 행 -->
                    <div th:if="${editingStep == null}" class="extractor-row" style="display:grid;grid-template-columns:120px 1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Source</label>
                            <select name="extractorSource" class="form-control">
                                <option value="BODY">Body</option>
                                <option value="HEADER">Header</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label>JsonPath / Header Name</label>
                            <input type="text" name="extractorJsonPath" class="form-control" placeholder="$.data.token"/>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Variable Name</label>
                            <input type="text" name="extractorVariable" class="form-control" placeholder="authToken"/>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.extractor-row').remove()" style="margin-bottom:0.25rem;">X</button>
                    </div>
                </div>
                <button type="button" class="btn btn-ghost btn-sm" onclick="addExtractorRow()" style="margin-bottom:1.25rem;">+ Add Extractor</button>

                <div class="form-section">Validators <span class="tip" data-tip="응답이 기대한 값과 일치하는지 검증합니다. 실패하면 해당 요청이 에러로 처리됩니다.">?</span></div>
                <div id="validator-list">
                    <!-- 편집 모드: 기존 Validator 표시 -->
                    <div th:if="${editingStep != null}" th:each="val : ${editingStep.validators}" class="validator-row" style="display:grid;grid-template-columns:160px 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                        <div class="form-group" style="margin-bottom:0;">
                            <select name="validatorType" class="form-control">
                                <option value="STATUS" th:selected="${val.type.name() == 'STATUS'}">Status Code</option>
                                <option value="BODY_CONTAINS" th:selected="${val.type.name() == 'BODY_CONTAINS'}">Body Contains</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <input type="text" name="validatorExpected" class="form-control" th:value="${val.expected}"/>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.validator-row').remove()" style="margin-bottom:0.25rem;">X</button>
                    </div>
                    <!-- 신규 모드: 빈 행 -->
                    <div th:if="${editingStep == null}" class="validator-row" style="display:grid;grid-template-columns:160px 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Type</label>
                            <select name="validatorType" class="form-control">
                                <option value="STATUS">Status Code</option>
                                <option value="BODY_CONTAINS">Body Contains</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Expected Value</label>
                            <input type="text" name="validatorExpected" class="form-control" placeholder="200"/>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.validator-row').remove()" style="margin-bottom:0.25rem;">X</button>
                    </div>
                </div>
                <button type="button" class="btn btn-ghost btn-sm" onclick="addValidatorRow()" style="margin-bottom:1.5rem;">+ Add Validator</button>

                <div>
                    <button type="submit" class="btn btn-primary" th:text="${editingStep != null ? 'Update Step' : 'Add Step'}">Add Step</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
function addExtractorRow() {
    const html = `<div class="extractor-row" style="display:grid;grid-template-columns:120px 1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
        <div class="form-group" style="margin-bottom:0;">
            <select name="extractorSource" class="form-control"><option value="BODY">Body</option><option value="HEADER">Header</option></select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <input type="text" name="extractorJsonPath" class="form-control" placeholder="$.data.token"/>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <input type="text" name="extractorVariable" class="form-control" placeholder="authToken"/>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.extractor-row').remove()" style="margin-bottom:0.25rem;">X</button>
    </div>`;
    document.getElementById('extractor-list').insertAdjacentHTML('beforeend', html);
}
function addValidatorRow() {
    const html = `<div class="validator-row" style="display:grid;grid-template-columns:160px 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
        <div class="form-group" style="margin-bottom:0;">
            <select name="validatorType" class="form-control"><option value="STATUS">Status Code</option><option value="BODY_CONTAINS">Body Contains</option></select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <input type="text" name="validatorExpected" class="form-control" placeholder="200"/>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.validator-row').remove()" style="margin-bottom:0.25rem;">X</button>
    </div>`;
    document.getElementById('validator-list').insertAdjacentHTML('beforeend', html);
}
function addStageRow() {
    const html = `<div class="stage-row" style="display:grid;grid-template-columns:1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
        <div class="form-group" style="margin-bottom:0;"><label>Duration (s)</label><input type="number" name="stageDuration" class="form-control" min="1" placeholder="60"/></div>
        <div class="form-group" style="margin-bottom:0;"><label>Target VU</label><input type="number" name="stageTargetVu" class="form-control" min="0" placeholder="50"/></div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.stage-row').remove()" style="margin-bottom:0.25rem;">X</button>
    </div>`;
    document.getElementById('stage-list').insertAdjacentHTML('beforeend', html);
}
function addThresholdRow() {
    const html = `<div class="threshold-row" style="display:grid;grid-template-columns:140px 100px 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.5rem;">
        <div class="form-group" style="margin-bottom:0;"><select name="thresholdMetric" class="form-control"><option value="AVG">AVG</option><option value="P50">P50</option><option value="P90">P90</option><option value="P95">P95</option><option value="P99">P99</option><option value="ERROR_RATE">Error Rate</option><option value="TPS">TPS</option></select></div>
        <div class="form-group" style="margin-bottom:0;"><select name="thresholdOperator" class="form-control"><option value="LT">&lt;</option><option value="LTE">≤</option><option value="GT">&gt;</option><option value="GTE">≥</option></select></div>
        <div class="form-group" style="margin-bottom:0;"><input type="text" name="thresholdValue" class="form-control" placeholder="100"/></div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.threshold-row').remove()" style="margin-bottom:0.25rem;">X</button>
    </div>`;
    document.getElementById('threshold-list').insertAdjacentHTML('beforeend', html);
}
function toggleThinkTime() {
    const s = document.getElementById('thinkTimeStrategy').value;
    document.getElementById('thinkTimeMsGroup').style.display = (s === 'CONSTANT' || s === 'PACING') ? '' : 'none';
    document.getElementById('thinkTimeMinGroup').style.display = s === 'RANDOM' ? '' : 'none';
    document.getElementById('thinkTimeMaxGroup').style.display = s === 'RANDOM' ? '' : 'none';
}
function toggleAuthTokens() {
    document.getElementById('authTokensGroup').style.display = document.getElementById('authMode').value === 'TOKEN_POOL' ? '' : 'none';
}
function validatePlanForm() {
    const stages = document.querySelectorAll('#stage-list .stage-row');
    if (stages.length > 0) return true;
    const rpv = document.getElementById('requestsPerVu').value.trim();
    const dur = document.getElementById('durationSeconds').value.trim();
    if (!rpv && !dur) {
        alert('Requests per VU 또는 Duration 중 하나는 반드시 입력해야 합니다.\n(Stages를 설정한 경우에는 불필요합니다.)');
        return false;
    }
    return true;
}
document.addEventListener('DOMContentLoaded', function() {
    toggleThinkTime(); toggleAuthTokens();
    const editForm = document.getElementById('step-form');
    if (editForm) editForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
});
</script>
</body>
</html>
